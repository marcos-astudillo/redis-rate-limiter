# Redis configuration for rate limiter

# Persistence: use AOF for durability
appendonly yes
appendfsync everysec

# Memory policy: when maxmemory is reached, evict least recently used keys
maxmemory 256mb
maxmemory-policy allkeys-lru

# Connection settings
tcp-keepalive 60
timeout 0

# Logging
loglevel notice

# Disable dangerous commands in production
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""
